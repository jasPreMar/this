name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the commit this job pushes can trigger future workflows.
          # If you don't need that, the default GITHUB_TOKEN is fine.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          SHORT=$(cat VERSION)
          LATEST_RELEASE=$(git tag --list 'v*' --sort=-v:refname | head -n1 | sed 's/^v//')
          LATEST_MATCHING_BUILD=$(git tag --list "v${SHORT}.*" --sort=-v:refname | head -n1 | sed -E "s/^v${SHORT//./\\.}\.([0-9]+)$/\\1/")

          if [[ -z "$LATEST_MATCHING_BUILD" || "$LATEST_MATCHING_BUILD" == "v${SHORT}.*" ]]; then
            BUILD=1
          else
            BUILD=$((LATEST_MATCHING_BUILD + 1))
          fi

          NEW_RELEASE="${SHORT}.${BUILD}"
          if [[ -n "$LATEST_RELEASE" ]]; then
            HIGHEST=$(printf '%s\n%s\n' "$NEW_RELEASE" "$LATEST_RELEASE" | sort -V | tail -n1)
            if [[ "$HIGHEST" != "$NEW_RELEASE" || "$NEW_RELEASE" == "$LATEST_RELEASE" ]]; then
              echo "Next release ($NEW_RELEASE) must be newer than the latest shipped version ($LATEST_RELEASE)." >&2
              exit 1
            fi
          fi

          echo "short=$SHORT"            >> $GITHUB_OUTPUT
          echo "build=$BUILD"            >> $GITHUB_OUTPUT
          echo "release=$NEW_RELEASE"    >> $GITHUB_OUTPUT
          echo "tag=v${NEW_RELEASE}"     >> $GITHUB_OUTPUT

      - name: Stamp version into Info.plist
        run: |
          SHORT=${{ steps.version.outputs.short }}
          BUILD=${{ steps.version.outputs.build }}
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${SHORT}.${BUILD}" Sources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${BUILD}"                     Sources/Info.plist

      - name: Resolve Swift packages
        run: swift package resolve

      # -----------------------------------------------------------------------
      # Distribution signing — Gatekeeper only shows the normal
      # "downloaded from the Internet" prompt when the build is signed with a
      # real Developer ID Application certificate and notarized by Apple.
      #
      # Required repository secrets:
      #   DEVELOPER_ID_APPLICATION_P12
      #   DEVELOPER_ID_APPLICATION_PASSWORD
      #   DEVELOPER_ID_APPLICATION_NAME
      #   APPLE_ID
      #   APPLE_TEAM_ID
      #   APPLE_APP_SPECIFIC_PASSWORD
      # -----------------------------------------------------------------------
      - name: Import Developer ID Application certificate
        id: signing
        env:
          SIGNING_CERT_P12:      ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
          SIGNING_CERT_NAME:     ${{ secrets.DEVELOPER_ID_APPLICATION_NAME }}
        run: |
          if [[ -z "${SIGNING_CERT_P12:-}" ]]; then
            echo "DEVELOPER_ID_APPLICATION_P12 is not configured." >&2
            exit 1
          fi

          KEYCHAIN=build.keychain
          security create-keychain -p "" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN"

          echo "$SIGNING_CERT_P12" | base64 --decode > /tmp/signing.p12
          security import /tmp/signing.p12 -k "$KEYCHAIN" \
            -P "$SIGNING_CERT_PASSWORD" -T /usr/bin/codesign
          rm /tmp/signing.p12

          security set-key-partition-list \
            -S "apple-tool:,apple:,codesign:" -s -k "" "$KEYCHAIN"

          echo "sign_identity=$SIGNING_CERT_NAME" >> "$GITHUB_OUTPUT"
          echo "Imported certificate: $SIGNING_CERT_NAME"

      - name: Build app bundle
        env:
          SIGN_IDENTITY: ${{ steps.signing.outputs.sign_identity }}
        run: |
          ./scripts/build-app.sh \
            --sign-mode developer-id \
            --sign-identity "$SIGN_IDENTITY"

      - name: Notarize app bundle
        env:
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          ./scripts/notarize.sh --path dist/HyperPointer.app

      - name: Build DMG
        env:
          SIGN_IDENTITY: ${{ steps.signing.outputs.sign_identity }}
        run: |
          ./scripts/build-dmg.sh \
            --skip-build \
            --app-path dist/HyperPointer.app \
            --sign-mode developer-id \
            --sign-identity "$SIGN_IDENTITY"

      - name: Notarize DMG
        env:
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          ./scripts/notarize.sh --path dist/HyperPointer.dmg

      - name: Collect DMG metadata
        id: dmg
        run: |
          SIZE=$(stat -f%z dist/HyperPointer.dmg)
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Sparkle EdDSA signing
      # Requires SPARKLE_PRIVATE_KEY secret — see README for key-generation steps.
      # -----------------------------------------------------------------------
      - name: Download Sparkle tools
        run: |
          SPARKLE_VER="2.6.4"
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VER}/Sparkle-${SPARKLE_VER}.tar.xz" \
            -o sparkle.tar.xz
          mkdir -p sparkle-tools
          tar -xf sparkle.tar.xz -C sparkle-tools

      - name: Sign DMG with Sparkle EdDSA key
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "SPARKLE_PRIVATE_KEY is not configured" >&2
            exit 1
          fi

          SIG="$(
            printf '%s' "$SPARKLE_PRIVATE_KEY" \
              | ./sparkle-tools/bin/sign_update --ed-key-file - -p dist/HyperPointer.dmg
          )"

          if [[ -z "$SIG" ]]; then
            echo "Sparkle signature was empty" >&2
            exit 1
          fi

          echo "signature=$SIG" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Update appcast.xml (replaces the entire file with the latest release)
      # -----------------------------------------------------------------------
      - name: Update appcast.xml
        env:
          TAG:       ${{ steps.version.outputs.tag }}
          SHORT:     ${{ steps.version.outputs.short }}
          BUILD:     ${{ steps.version.outputs.build }}
          SIZE:      ${{ steps.dmg.outputs.size }}
          SIGNATURE: ${{ steps.sign.outputs.signature }}
        run: |
          PUBDATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0"
               xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle"
               xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>HyperPointer Updates</title>
              <link>https://github.com/jasPreMar/hyper-pointer</link>
              <description>HyperPointer changelog</description>
              <language>en</language>
              <item>
                <title>Version ${SHORT}.${BUILD}</title>
                <sparkle:version>${BUILD}</sparkle:version>
                <sparkle:shortVersionString>${SHORT}.${BUILD}</sparkle:shortVersionString>
                <pubDate>${PUBDATE}</pubDate>
                <enclosure
                  url="https://github.com/jasPreMar/hyper-pointer/releases/download/${TAG}/HyperPointer.dmg"
                  length="${SIZE}"
                  type="application/octet-stream"
                  sparkle:edSignature="${SIGNATURE}" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Commit updated Info.plist and appcast.xml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sources/Info.plist appcast.xml
          git commit -m "chore: release ${{ steps.version.outputs.tag }} [skip ci]"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name:     ${{ steps.version.outputs.tag }}
          files:    dist/HyperPointer.dmg
          generate_release_notes: true
